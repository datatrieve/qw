[cerebrium.deployment]
name = "qwen35-9b"
python_version = "3.11"
docker_base_image_url = "debian:bookworm-slim"
disable_auth = true
include = ['./*', 'main.py', 'cerebrium.toml']
exclude = ['.*']

[cerebrium.hardware]
cpu = 4
memory = 24.0
compute = "ADA_L4"
gpu_count = 1

[cerebrium.scaling]
min_replicas = 0
max_replicas = 1
cooldown = 300
replica_concurrency = 1
scaling_metric = "concurrency_utilization"

[cerebrium.dependencies.pip]
vllm = "latest"
torch = ">=2.0.0"
transformers = ">=4.35.0"
